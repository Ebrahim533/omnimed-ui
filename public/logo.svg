<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">
  <!-- Medical Kit Icon -->
  <g transform="translate(0, 5)">
    <!-- Kit Body -->
    <rect x="2" y="12" width="46" height="36" rx="6" fill="url(#kitGradient)" stroke="#0D9488" stroke-width="2"/>
    <!-- Kit Handle -->
    <path d="M16 12V8a4 4 0 014-4h12a4 4 0 014 4v4" stroke="#0D9488" stroke-width="2" fill="none"/>
    <!-- Cross -->
    <rect x="19" y="22" width="12" height="16" rx="2" fill="white"/>
    <rect x="15" y="26" width="20" height="8" rx="2" fill="white"/>
  </g>
  
  <!-- Text: OmniMed -->
  <text x="58" y="32" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1E293B">OmniMed</text>
  
  <!-- Text: Health -->
  <text x="172" y="32" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#0D9488">Health</text>
  
  <!-- Tagline -->
  <text x="58" y="48" font-family="Arial, sans-serif" font-size="9" letter-spacing="3" fill="#64748B">ENHANCE PATIENT OUTCOMES</text>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="kitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
  </defs>
</svg>
